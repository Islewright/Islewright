name: SonarCloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

env:
  CMAKE_TOOLCHAIN_FILE: ${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

jobs:
  sonarcloud:
    name: 🔎 SonarCloud Analysis
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip scan when SONAR_TOKEN is missing
        if: ${{ env.SONAR_TOKEN == '' }}
        run: echo "SONAR_TOKEN is not configured. Skipping SonarCloud scan."

      - name: Setup vcpkg
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: lukka/run-vcpkg@v11

      - name: Cache vcpkg binary packages
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/vcpkg-cache
          key: sonarcloud-vcpkg-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            sonarcloud-vcpkg-

      - name: Install system packages
        if: ${{ env.SONAR_TOKEN != '' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            autoconf-archive \
            libtool \
            pkg-config \
            ninja-build \
            libasound2-dev \
            libdbus-1-dev \
            libdecor-0-dev \
            libdrm-dev \
            libegl1-mesa-dev \
            libibus-1.0-dev \
            libpulse-dev \
            libltdl-dev \
            libudev-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            libxss-dev \
            libxtst-dev \
            wayland-protocols

      - name: Configure Build
        if: ${{ env.SONAR_TOKEN != '' }}
        run: |
          export VCPKG_BINARY_SOURCES="clear;files,${{ github.workspace }}/vcpkg-cache,readwrite"
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_TOOLCHAIN_FILE="$CMAKE_TOOLCHAIN_FILE"

      - name: Build
        if: ${{ env.SONAR_TOKEN != '' }}
        run: cmake --build build --parallel

      - name: SonarCloud Scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
